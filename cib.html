
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🖕🖕</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #ffffff;
  }
  .emoji-row {
    display: flex;
    gap: 40px;
  }
  .emoji {
    font-size: 160px;
    line-height: 1;
  }
  .mirrored {
    transform: scaleX(-1);
  }
</style>
</head>
<body>
  <div class="emoji-row">
    <span class="emoji">🖕</span>
  <span style="font-size: 48px; font-weight: bold;">شوف حد ينيكك</span>
    <span class="emoji mirrored">🖕</span>
  </div>
</body>
</html>
